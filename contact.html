<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JULIENISNERD | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow: hidden;
        }
        .contact-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 5vw;
        }
        .contact-title {
            font-size: 8vw;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin-bottom: 5vh;
        }
        .contact-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .contact-info a {
            font-size: 2.5rem;
            color: #000;
            text-decoration: none;
            font-weight: 300;
            transition: color 0.3s;
            cursor: none;
        }
        .contact-info a:hover {
            color: #000;
        }
        
        @media (max-width: 768px) {
            .contact-title { font-size: 15vw; }
            .contact-info a { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>

    <nav class="nav">
        <a href="index.html" class="logo" style="text-decoration:none; color:inherit;">JULIENISNERD.</a>
        <div class="menu-links">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="contact-container">
        <h1 class="contact-title" id="contact-anim-1">GET IN TOUCH.</h1>
        <div class="contact-info" id="contact-anim-2">
            <a href="mailto:hello@julienisnerd.design">hello@julienisnerd.design</a>
            <a href="tel:+821012345678">+82 10 1234 5678</a>
            <p style="margin-top: 30px; color: #000; font-weight: 300; font-size: 1.1rem;">Seoul, South Korea</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const cursor = document.querySelector('.cursor');
        const interactiveElements = document.querySelectorAll('a');

        window.addEventListener('mousemove', (e) => {
          gsap.to(cursor, {
            x: e.clientX,
            y: e.clientY,
            duration: 0.15,
            ease: "power2.out"
          });
        });

        interactiveElements.forEach(el => {
          el.addEventListener('mouseenter', () => cursor.classList.add('active'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        window.addEventListener('load', () => {
            gsap.from("#contact-anim-1", {
                y: 50, opacity: 0, duration: 1.5, ease: "power3.out", delay: 0.2
            });
            gsap.from("#contact-anim-2", {
                y: 50, opacity: 0, duration: 1.5, ease: "power3.out", delay: 0.4
            });
        });
    </script>
</body>
</html>
